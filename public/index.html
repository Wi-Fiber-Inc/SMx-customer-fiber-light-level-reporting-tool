<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Local Calix SMx subscriber light-level report"
    />
    <title>SMx Fiber Levels</title>
    <link rel="stylesheet" href="/vendor/leaflet/leaflet.css" />
    <link rel="stylesheet" href="/styles.css" />
    <script src="/vendor/leaflet/leaflet.js" defer></script>
    <script src="/app.js" type="module"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="header-copy">
        <h1>Fiber Light Levels</h1>
        <p id="collection-time" class="collection-time">Loading cache…</p>
      </div>
      <button id="reload-button" class="secondary-button" type="button">
        Reload cache
      </button>
    </header>

    <main>
      <section id="summary" class="summary-grid" aria-label="Report summary">
        <article class="summary-card summary-neutral">
          <span>Total ONTs</span>
          <strong id="total-count">—</strong>
        </article>
        <article class="summary-card summary-healthy">
          <span>Healthy</span>
          <strong id="healthy-count">—</strong>
        </article>
        <article class="summary-card summary-warning">
          <span>Warning</span>
          <strong id="warning-count">—</strong>
        </article>
        <article class="summary-card summary-critical">
          <span>Critical</span>
          <strong id="critical-count">—</strong>
        </article>
        <article class="summary-card summary-no-signal">
          <span>No signal</span>
          <strong id="no-signal-count">—</strong>
        </article>
        <article class="summary-card summary-error">
          <span>API errors</span>
          <strong id="error-count">—</strong>
        </article>
      </section>

      <section class="report-panel" aria-labelledby="report-title">
        <div class="report-heading">
          <div>
            <h2 id="report-title">Subscriber report</h2>
          </div>
          <div class="report-meta">
            <p id="result-count" class="result-count">Loading records…</p>
            <div class="view-switch" aria-label="Report view">
              <button
                id="map-view-button"
                class="view-button active-view-button"
                type="button"
                aria-pressed="true"
              >
                Map
              </button>
              <button
                id="table-view-button"
                class="view-button"
                type="button"
                aria-pressed="false"
              >
                Table
              </button>
            </div>
          </div>
        </div>

        <div class="controls">
          <label class="search-control" for="search-input">
            <span>Search</span>
            <input
              id="search-input"
              type="search"
              placeholder="Address, account, ONT, serial, or OLT"
              autocomplete="off"
            />
          </label>

          <label class="filter-control" for="health-filter">
            <span>Status</span>
            <select id="health-filter">
              <option value="all">All statuses</option>
              <option value="healthy">Healthy</option>
              <option value="warning">Warning</option>
              <option value="critical">Critical</option>
              <option value="no-signal">No signal</option>
              <option value="error">API error</option>
            </select>
          </label>

          <button id="clear-button" class="clear-button" type="button">
            Clear filters
          </button>
        </div>

        <div id="error-banner" class="error-banner" role="alert" hidden></div>

        <div id="map-view" class="map-view">
          <div
            id="network-map"
            class="network-map"
            role="region"
            aria-label="Subscriber light-level map"
          ></div>
          <div class="map-footer">
            <p id="map-count" class="map-count">Loading map…</p>
            <div class="map-legend" aria-label="Map marker receive power">
              <span class="signal-legend-item">
                <span class="signal-legend-dot" data-signal-value="-15"></span>
                ≥ -15
              </span>
              <span class="signal-legend-item">
                <span class="signal-legend-dot" data-signal-value="-20"></span>
                -20
              </span>
              <span class="signal-legend-item">
                <span class="signal-legend-dot" data-signal-value="-25"></span>
                -25
              </span>
              <span class="signal-legend-item">
                <span class="signal-legend-dot" data-signal-value="-28"></span>
                -28
              </span>
              <span class="signal-legend-item">
                <span class="signal-legend-dot" data-signal-value="-30"></span>
                ≤ -30 dBm
              </span>
              <span class="signal-legend-item">
                <span class="signal-legend-dot unavailable-signal-dot"></span>
                Unavailable
              </span>
            </div>
          </div>
        </div>

        <div id="table-view" class="table-wrap" hidden>
          <table>
            <thead>
              <tr>
                <th scope="col">Status</th>
                <th scope="col">Service address</th>
                <th scope="col">Account</th>
                <th scope="col">ONT</th>
                <th scope="col">OLT</th>
                <th scope="col" class="number-column">ONT Rx</th>
                <th scope="col" class="number-column">OLT Rx</th>
                <th scope="col">Collected</th>
                <th scope="col">Error</th>
              </tr>
            </thead>
            <tbody id="report-body"></tbody>
          </table>
        </div>

        <div
          id="pagination"
          class="pagination"
          aria-label="Report pagination"
          hidden
        >
          <button id="previous-button" class="page-button" type="button">
            Previous
          </button>
          <span id="page-label">Page 1</span>
          <button id="next-button" class="page-button" type="button">
            Next
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
